<!DOCTYPE html>
<html>

<head>

    <title>Seller Login</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f4fff5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:90%;
            max-width:500px;
            background:white;
            padding:50px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#1b8f3c;
            margin-bottom:35px;
        }


        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:16px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            background:#1b8f3c;
            color:white;
            border-radius:10px;
            font-size:20px;
            cursor:pointer;
        }

        .error{
            background:#ffebee;
            color:red;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>
        Seller Login
    </h1>

    {% if error %}

    <div class="error">
        {{ error }}
    </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="seller_name"
               placeholder="Enter Seller Name"
               required>

        <input type="text"
               name="phone_number"
               placeholder="Enter Phone Number"
               required>

        <button type="submit">
            Login
        </button>

    </form>
    if you don't have an account?<a href="/seller-register/">Register here</a>

</div>

</body>
</html>
