<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Buy Product</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f5fff4;
        }

        .container{
            width:90%;
            max-width:1200px;
            margin:50px auto;
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:50px;
            align-items:center;
        }

        .product-card{
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .product-card img{
            width:100%;
            height:500px;
            object-fit:cover;
        }

        .product-content{
            padding:30px;
        }

        .product-content h1{
            color:#1b8f3c;
            font-size:45px;
            margin-bottom:20px;
        }

        .price{
            font-size:35px;
            color:#ff5722;
            font-weight:bold;
            margin-bottom:20px;
        }

        .description{
            color:#555;
            line-height:1.8;
            font-size:18px;
        }

        .buy-form{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .buy-form h1{
            color:#1b8f3c;
            margin-bottom:30px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:16px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            background:#1b8f3c;
            color:white;
            border-radius:10px;
            font-size:20px;
            cursor:pointer;
        }

        button:hover{
            background:#146c2f;
        }

        .delivery{
            background:#e8f5e9;
            color:#1b8f3c;
            padding:15px;
            border-radius:10px;
            margin-top:20px;
            font-weight:bold;
        }

        @media(max-width:900px){

            .container{
                grid-template-columns:1fr;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- PRODUCT DETAILS -->

    <div class="product-card">

        <img src="{{ product.image }}">

        <div class="product-content">

            <h1>
                {{ product.name }}
            </h1>

            <div class="price">
                ₹{{ product.price }} / KG
            </div>

            <p class="description">
                {{ product.description }}
            </p>

            <div class="delivery">
                🚚 Free delivery available today
            </div>

        </div>

    </div>

    <!-- BUY FORM -->

    <div class="buy-form">

        <h1>Place Your Order</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="customer_name"
                   placeholder="Enter Your Name"
                   required>

            <input type="text"
                   name="phone"
                   placeholder="Enter Phone Number"
                   required>
                   <input type="text"
       name="buyer_state"
       placeholder="State"
       required>

<input type="text"
       name="buyer_district"
       placeholder="District"
       required>

<input type="text"
       name="buyer_mandal"
       placeholder="Mandal"
       required>

<input type="text"
       name="buyer_village"
       placeholder="Village / Town"
       required>

            <textarea
                name="address"
                placeholder="Enter Delivery Address"
                required></textarea>

            <input type="number"
                   step="0.5"
                   min="1"
                   name="quantity"
                   placeholder="Enter Quantity in KG"
                   required>


            <select name="payment_method"
                    required>

                <option value="">
                    Select Payment Method
                </option>

                <option value="UPI">
                    UPI
                </option>

                <option value="COD">
                    Cash On Delivery
                </option>

                <option value="NETBANKING">
                    Net Banking
                </option>

            </select>

            <button type="submit">

                Confirm Order

            </button>

        </form>

    </div>

</div>

</body>

</html>
