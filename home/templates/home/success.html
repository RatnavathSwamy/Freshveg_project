<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Order Success</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f5fff4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .success-box{
            width:90%;
            max-width:700px;
            background:white;
            padding:60px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .icon{
            font-size:100px;
            margin-bottom:20px;
        }

        h1{
            color:#1b8f3c;
            font-size:50px;
            margin-bottom:20px;
        }

        p{
            color:#555;
            font-size:20px;
            line-height:1.8;
        }

        .buttons{
            margin-top:40px;
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .btn{
            padding:16px 30px;
            border:none;
            border-radius:12px;
            color:white;
            font-size:18px;
            cursor:pointer;
            text-decoration:none;
            font-weight:bold;
        }

        .shop-btn{
            background:#1b8f3c;
        }

        .orders-btn{
            background:#ff9800;
        }

        .home-btn{
            background:#2196f3;
        }

        .info-box{
            margin-top:35px;
            background:#e8f5e9;
            padding:20px;
            border-radius:15px;
            color:#1b8f3c;
            font-weight:bold;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="success-box">

    <div class="icon">
        ✅
    </div>

    <h1>
        Order Placed Successfully!
    </h1>

    <p>
        Thank you for shopping with FreshVeg.
        Your fresh vegetables will be delivered soon.
    </p>

    <div class="info-box">

        🚚 Estimated Delivery:
        Today within 2-4 hours

    </div>

    <div class="buttons">

        <a href="/products/"
           class="btn shop-btn">

            Buy More

        </a>

        <a href="/my-orders/"
           class="btn orders-btn">

            My Orders

        </a>

        <a href="/"
           class="btn home-btn">

            Home

        </a>

    </div>

</div>

</body>

</html>
