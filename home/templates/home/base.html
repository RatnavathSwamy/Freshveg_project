

<!DOCTYPE html>
<html>

<head>

    <title>Fresh Vegetable System</title>

    <meta name="viewport"
    content="width=device-width, initial-scale=1">

</head>

<body style="
margin:0;
padding:0;
font-family:Arial;
background:#f4f4f4;">


    {% if messages %}

        {% for message in messages %}

            <div style="
            background:green;
            color:white;
            padding:15px;
            text-align:center;">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    {% block content %}
    {% endblock %}

</body>

</html>
