<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <style>

        body{
            font-family:Arial;
            background:#f4fff5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .register-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#1b8f3c;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:15px;
            background:#1b8f3c;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        p{
            text-align:center;
            margin-top:20px;
        }

        a{
            color:#1b8f3c;
            text-decoration:none;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="register-box">

    <h1>Create Account</h1>

    {% if error %}

        <div class="error">
            {{ error }}
        </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have account?
        <a href="/login/">
            Login
        </a>
    </p>

</div>

</body>
</html>
