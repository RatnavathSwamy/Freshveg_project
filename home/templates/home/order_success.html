<!DOCTYPE html>
<html>

<head>

    <title>Order Success</title>

    <style>

        body{
            font-family:Arial;
            background:#f4fff5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .success-box{
            background:white;
            padding:60px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .success-box h1{
            color:#1b8f3c;
            font-size:50px;
        }

        .success-box p{
            margin-top:20px;
            font-size:20px;
            color:gray;
        }

        .success-box a{
            display:inline-block;
            margin-top:30px;
            background:#1b8f3c;
            color:white;
            padding:15px 30px;
            text-decoration:none;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="success-box">

    <h1>✅ Order Placed Successfully!</h1>

    <p>
        Thank you for shopping with FreshVeg.
    </p>

    <p>
        Your vegetables will be delivered soon.
    </p>

    <a href="/products/">
        Continue Shopping
    </a>

</div>

</body>
</html>
